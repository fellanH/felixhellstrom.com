<div class="hero">
  <div class="hero-bg">
    <div class="hero-orb hero-orb-1"></div>
    <div class="hero-orb hero-orb-2"></div>
  </div>
  <div class="hero-content">
    <h1>{title}</h1>
    <p class="hero-sub">
      {subtitle}
    </p>
    <div class="btn-row">
      <a href="{primary_href}" class="btn btn-primary">{primary_label}</a>
      <a href="{secondary_href}" class="btn btn-outline">{secondary_label}</a>
    </div>
  </div>
</div>
